<!DOCTYPE html>
<html>
<head>
  <title>Inner Compass</title>
  <style>
    body {
      font-family: Arial;
      max-width: 600px;
      margin: 80px auto;
      line-height: 1.6;
    }

    textarea {
      width: 100%;
      height: 120px;
      margin-top: 10px;
    }

    button {
      margin-top: 10px;
      padding: 10px 15px;
      cursor: pointer;
    }

    #response {
      margin-top: 20px;
      padding: 15px;
      background: #f4f4f4;
    }
  </style>
</head>

<body>

  <h1>Inner Compass</h1>

  <p>How are you feeling right now?</p>

  <textarea id="input"></textarea>

  <button onclick="respond()">Reflect back to me</button>

  <div id="response"></div>

  <script>
    function respond() {
      const input = document.getElementById("input").value.toLowerCase();

      let message = "";

      if (input.includes("stress") || input.includes("anxious")) {
        message = "It sounds like your system is under pressure. What would feel like 5% more ease right now?";
      } else if (input.includes("lost") || input.includes("confused")) {
        message = "Not knowing is still a valid place to be. What is one thing you *do* know today?";
      } else {
        message = "I hear you. Try asking yourself: what would support me most gently right now?";
      }

      document.getElementById("response").innerText = message;
    }
  </script>

</body>
</html>
